name: Collect Joyalukkas Gold Rate

on:
  schedule:
    # Cron times are in UTC. UAE is UTC+4, so these correspond to
    # roughly 9:00 AM and 4:00 PM Dubai time. Adjust as you like.
    - cron: "7 5 * * *"   # 09:00 Dubai time
    - cron: "13 12 * * *"  # 16:00 Dubai time
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab too

permissions:
  contents: write   # needed so the workflow can commit the updated JSON file back

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run collector
        run: node collect-joyalukkas-rate.js

      - name: Commit updated history file
        run: |
          git config user.name "gold-rate-bot"
          git config user.email "actions@users.noreply.github.com"
          git add joyalukkas-history.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update gold rate history"
          git push
